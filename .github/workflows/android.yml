name: Android CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses

      - name: Verify environment
        run: |
          chmod +x gradlew
          ./gradlew --version
          echo "---"
          ls -la "$ANDROID_HOME/platforms/" || echo "No platforms"
          ls -la "$ANDROID_HOME/build-tools/" || echo "No build-tools"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle_build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle_build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nova-music-debug
          path: app/build/outputs/apk/debug/*.apk

  release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses
      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
