name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SDK dir set to: $ANDROID_HOME"

      - name: Verify Gradle wrapper
        run: |
          echo "=== Wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo "=== gradlew exists ==="
          ls -la gradlew
          echo "=== wrapper JAR ==="
          ls -la gradle/wrapper/gradle-wrapper.jar
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== ANDROID_HOME ==="
          echo "$ANDROID_HOME"
          echo "=== local.properties ==="
          cat local.properties

      - name: gradlew --version
        run: |
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "GRADLE_VERSION_FAILED"

      - name: gradlew assembleDebug
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-music-debug
          path: app/build/outputs/apk/debug/*.apk
